# Validate every pull request (and pushes to main) automatically: run the test
# suite and static checks so changes are verified before merge. Kept consistent
# with the rest of the pipeline: hosted runners, SHA-pinned actions, least
# privilege.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run the test suite
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet --disable-pip-version-check \
            pytest 'cryptography==43.0.3'
          .venv/bin/python -m pytest -q

  static:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Byte-compile the package
        run: python3 -m compileall -q bol

      - name: Shellcheck the scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck
          shellcheck -S warning scripts/*.sh

      - name: Lint the workflows (actionlint)
        run: |
          ver=1.7.7
          sha=023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757
          curl -fsSL -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ver}/actionlint_${ver}_linux_amd64.tar.gz"
          echo "${sha}  actionlint.tar.gz" | sha256sum -c -
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint -color
